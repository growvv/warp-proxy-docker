version: '3.8'
services:
  warp-socks:
    build: .
    container_name: warp-socks
    privileged: true
    ports:
      - "1080:1080"
    environment:
      - RESTART_INTERVAL=3600 # 每小时换一次 IP
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
    restart: always
